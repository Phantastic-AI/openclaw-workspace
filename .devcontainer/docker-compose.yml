version: "3.8"

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - openclaw-home:/home/node/.openclaw
      - node-modules:/workspace/node_modules
    ports:
      - "18789:18789"
      - "1455:1455"
    environment:
      - NODE_ENV=development
      - TERM=xterm-256color
    user: node
    command: sleep infinity

volumes:
  openclaw-home:
  node-modules:
